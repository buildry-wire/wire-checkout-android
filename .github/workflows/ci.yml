name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4

      # Generate the wrapper jar if it is not committed, so ./gradlew works.
      - name: Ensure Gradle wrapper jar
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.10.2
          fi

      - name: Unit tests
        run: ./gradlew :wire-checkout-android:test --no-daemon

      - name: Assemble release AAR
        run: ./gradlew :wire-checkout-android:assembleRelease --no-daemon
